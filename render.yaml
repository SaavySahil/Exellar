services:
  # Flask Backend API
  - type: web
    name: exellar-api
    runtime: python
    rootDir: exellar-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: exellar-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://exellar.pages.dev,https://exellar-admin.vercel.app,https://exellar.co.in
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/uploads

databases:
  - name: exellar-db
    plan: free
    databaseName: exellar
    user: exellar
